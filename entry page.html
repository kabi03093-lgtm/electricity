<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* MAIN LOGIN CARD */
        .login-card {
            background: #d1d9e0; /* Match image background */
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #0077b6; /* Image blue */
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ROLE SELECTOR STYLING */
        .role-selector {
            margin-bottom: 25px;
            text-align: left;
        }

        .role-selector label {
            font-size: 12px;
            font-weight: 700;
            color: #555;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #0077b6;
            border-radius: 8px;
            background: white;
            font-size: 15px;
            font-weight: 600;
            color: #0077b6;
            cursor: pointer;
            outline: none;
        }

        /* FORM FIELDS */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s ease;
        }

        input:focus {
            border-color: #0077b6;
        }

        /* CAPTCHA STYLES */
        .captcha-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #e0f7fa;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .captcha-code {
            flex-grow: 1;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 5px;
            color: #2c3e50;
            user-select: none;
            font-style: italic;
        }

        .refresh-btn {
            background: #0077b6;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
        }

        /* LOGIN BUTTON */
        .login-btn {
            width: 100%;
            background: #0077b6;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #023e8a;
            transform: translateY(-1px);
        }

        /* MESSAGE ALERTS */
        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
            font-weight: 600;
        }

        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

    </style>
</head>
<body>

<div class="login-card">
    <h2>Electricity Card<br>Login</h2>

    <div class="role-selector">
        <label>Select Login Type</label>
        <select id="roleSelect" onchange="updateFormLabels()">
            <option value="people">People (Consumer)</option>
            <option value="admin">Admin (Staff)</option>
        </select>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label id="idLabel">Card Number</label>
            <input type="text" id="userInput" placeholder="Enter ID" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="•••••" required>
        </div>

        <div class="form-group">
            <label>Captcha Verification</label>
            <div class="captcha-area">
                <div class="captcha-code" id="captchaDisplay">00000</div>
                <button type="button" class="refresh-btn" onclick="generateCaptcha()">↻</button>
            </div>
            <input type="text" id="captchaInput" placeholder="Type the code above" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div id="message"></div>
</div>

<script>
    let currentCaptcha = "";

    // 1. Update form labels based on Dropdown selection
    function updateFormLabels() {
        const role = document.getElementById("roleSelect").value;
        const idLabel = document.getElementById("idLabel");
        const userInput = document.getElementById("userInput");

        if (role === "admin") {
            idLabel.innerText = "Username";
            userInput.placeholder = "Enter Admin Username";
        } else {
            idLabel.innerText = "Card Number";
            userInput.placeholder = "Enter 8-Digit Card No.";
        }
        // Clear message when switching
        document.getElementById("message").style.display = "none";
    }

    // 2. Generate Random 5-digit Captcha
    function generateCaptcha() {
        currentCaptcha = Math.floor(10000 + Math.random() * 90000).toString();
        document.getElementById("captchaDisplay").innerText = currentCaptcha;
    }

    // 3. Handle Login
    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const role = document.getElementById("roleSelect").value;
        const userValue = document.getElementById("userInput").value;
        const passValue = document.getElementById("password").value;
        const captchaValue = document.getElementById("captchaInput").value;
        const msgBox = document.getElementById("message");

        // Validate Captcha
        if (captchaValue !== currentCaptcha) {
            showResult("Captcha does not match!", "error");
            generateCaptcha();
            return;
        }

        // Logic (For demonstration: password is '123' for everyone)
        if (passValue === "123") {
            showResult(`Login Successful as ${role.toUpperCase()}!`, "success");
            
            // Log access to LocalStorage
            let history = JSON.parse(localStorage.getItem("accessLogs") || "[]");
            history.push({
                user: userValue,
                role: role,
                time: new Date().toLocaleString()
            });
            localStorage.setItem("accessLogs", JSON.stringify(history));

        } else {
            showResult("Invalid ID or Password.", "error");
        }
    });

    function showResult(text, type) {
        const msgBox = document.getElementById("message");
        msgBox.innerText = text;
        msgBox.className = type;
        msgBox.style.display = "block";
    }

    // Initial Setup
    window.onload = generateCaptcha;
</script>

</body>
</html>
